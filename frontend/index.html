<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Sentrix | AI Customer Review Analytics & Issue Detection</title>

    <meta
      name="description"
      content="Sentrix is an AI-powered customer review analytics platform that uncovers sentiment trends, detects product issues, analyzes topics, and delivers actionable insights from customer feedback."
    />

    <meta
      name="keywords"
      content="Sentrix, AI review analytics, sentiment analysis, issue detection, customer feedback, review intelligence, NLP, product analytics, review dashboard"
    />

    <meta name="author" content="Swyra" />
    <meta name="application-name" content="Sentrix" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#111827" />

    <!-- Canonical -->
    <link rel="canonical" href="https://sentrix.swyra.com/" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sentrix" />
    <meta property="og:title" content="Sentrix | AI Customer Review Analytics" />
    <meta
      property="og:description"
      content="Analyze thousands of customer reviews with AI. Discover sentiment trends, detect product issues, and gain actionable business insights."
    />
    <meta property="og:url" content="https://sentrix.swyra.com/" />
    <meta property="og:image" content="https://sentrix.swyra.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sentrix | AI Customer Review Analytics" />
    <meta
      name="twitter:description"
      content="AI-powered sentiment analysis and issue detection platform for customer reviews."
    />
    <meta name="twitter:image" content="https://sentrix.swyra.com/og-image.png" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
      rel="stylesheet"
    />
  </head>

  <body>
    <noscript>
      Sentrix requires JavaScript to run.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
